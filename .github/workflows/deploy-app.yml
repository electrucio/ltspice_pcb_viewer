name: Deploy app to electrucio.github.io

# Builds modules/app (the LTspice <-> KiCad mapper SPA) and publishes it into the
# ltspice-kicad-mapper/ subfolder of the electrucio/electrucio.github.io repo, which
# serves GitHub Pages from its default branch root.
#
# Requires a repository secret PAGES_DEPLOY_TOKEN: a token with push access to
# electrucio/electrucio.github.io (see README section "Deploying the app" for setup).

on:
  push:
    branches: [main]
    paths:
      - "modules/app/**"
      - "modules/ltspice_kicad_mapper/**"
      - "modules/kicad_schematic_viewer/**"
      - "modules/ltspice_schematic_viewer/**"
      - "modules/kicad_pcb_viewer/**"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch: {}

env:
  DEPLOY_SUBPATH: ltspice-kicad-mapper

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ltspice_pcb_viewer
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: modules/app/package-lock.json

      - name: Install dependencies
        working-directory: modules/app
        run: npm ci

      - name: Build (base path = /${{ env.DEPLOY_SUBPATH }}/)
        working-directory: modules/app
        env:
          VITE_BASE: /${{ env.DEPLOY_SUBPATH }}/
        run: npm run build

      - name: Checkout electrucio.github.io
        uses: actions/checkout@v4
        with:
          repository: electrucio/electrucio.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages-repo

      - name: Sync build output into the target subfolder
        run: |
          mkdir -p "pages-repo/${DEPLOY_SUBPATH}"
          rsync -a --delete modules/app/dist-app/ "pages-repo/${DEPLOY_SUBPATH}/"

      - name: Commit and push
        working-directory: pages-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DEPLOY_SUBPATH}"
          if git diff --cached --quiet; then
            echo "Nothing changed, skipping commit."
          else
            git commit -m "Deploy ${DEPLOY_SUBPATH}: ${GITHUB_SHA}"
            git push
          fi
