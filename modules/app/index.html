<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LTspice ↔ KiCad — mapper &amp; cross-probe</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { display: flex; flex-direction: column; height: 100vh;
        font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; color: #11161c; background: #fff; }
      .appbar { flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
        padding: 8px 12px; background: #11161c; color: #e6e8ea; }
      .appbar strong { font-size: 14px; }
      .appbar .sep { margin-left: auto; }
      .appbar button { padding: 7px 13px; background: #2b333d; color: #e6e8ea; border: 1px solid #3a4350;
        border-radius: 6px; cursor: pointer; font: inherit; font-weight: 600; }
      .appbar button:hover { filter: brightness(1.15); }
      .appbar button.primary { background: #1a8f3c; border-color: #1a8f3c; color: #fff; font-weight: 700; }
      .appbar .msg { color: #39d353; min-width: 90px; }
      ltspice-kicad-mapper { flex: 1 1 auto; min-height: 0; }
      /* SPICE directives panel */
      #dir-panel { position: fixed; right: 12px; top: 48px; z-index: 50; display: none;
        max-width: 540px; max-height: 60vh; overflow: auto; padding: 10px 12px;
        background: rgba(17,22,28,0.97); color: #e6e8ea; border: 1px solid #3a4350; border-radius: 8px;
        font: 12px ui-monospace, Menlo, monospace; white-space: pre-wrap; box-shadow: 0 6px 20px rgba(0,0,0,.4); }
      #dir-panel.show { display: block; }
      /* .raw processing options dialog */
      #sim-modal { position: fixed; inset: 0; z-index: 100; display: none;
        align-items: center; justify-content: center; background: rgba(10,13,17,0.55); }
      #sim-modal.show { display: flex; }
      #sim-modal .card { width: 380px; max-width: 92vw; background: #fff; color: #11161c;
        border-radius: 10px; box-shadow: 0 12px 40px rgba(0,0,0,.35); padding: 18px 20px; }
      #sim-modal h2 { margin: 0 0 4px; font-size: 15px; }
      #sim-modal .sub { margin: 0 0 14px; font-size: 12px; color: #667; word-break: break-all; }
      #sim-modal .opt { padding: 10px 0; border-top: 1px solid #eceef1; }
      #sim-modal .opt label.head { display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; }
      #sim-modal .opt .field { display: flex; align-items: center; gap: 8px; margin: 8px 0 0 24px; font-size: 12px; color: #445; }
      #sim-modal .opt .field input { width: 110px; padding: 5px 7px; font: inherit;
        border: 1px solid #cdd3da; border-radius: 5px; }
      #sim-modal .opt .field input:disabled { background: #f2f3f5; color: #aab; }
      #sim-modal .opt.disabled .field { opacity: .5; }
      #sim-modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
      #sim-modal .actions button { padding: 7px 14px; border-radius: 6px; border: 1px solid #cdd3da;
        background: #f4f5f7; color: #11161c; cursor: pointer; font: inherit; font-weight: 600; }
      #sim-modal .actions button.primary { background: #1a8f3c; border-color: #1a8f3c; color: #fff; }
    </style>
  </head>
  <body>
    <div class="appbar">
      <strong>LTspice ↔ KiCad</strong>
      <span class="sep"></span>
      <input id="raw-in" type="file" accept=".raw" style="display:none" />
      <input id="op-in" type="file" accept=".raw" style="display:none" />
      <input id="net-in" type="file" accept=".net,.cir,.txt" style="display:none" />
      <button id="load-raw">Load .raw</button>
      <button id="load-op">Load .op.raw</button>
      <button id="load-net">Load .net</button>
      <button id="directives">ƒ directives</button>
      <button id="download" class="primary">⬇ Download read-only HTML</button>
      <span id="msg" class="msg"></span>
    </div>
    <div id="dir-panel"></div>
    <div id="sim-modal">
      <div class="card">
        <h2>Process simulation</h2>
        <p class="sub" id="sim-file"></p>
        <div class="opt" id="opt-thd-row">
          <label class="head"><input type="checkbox" id="opt-thd" checked /> Compute THD &amp; harmonic spectrum</label>
          <div class="field"><span>Fundamental f₀</span><input type="number" id="opt-f0" min="0" step="any" /><span>Hz</span></div>
        </div>
        <div class="opt" id="opt-ripple-row">
          <label class="head"><input type="checkbox" id="opt-ripple" checked /> Compute ripple amplitude</label>
          <div class="field"><span>Mains frequency</span><input type="number" id="opt-mains" min="0" step="any" /><span>Hz</span></div>
        </div>
        <div class="actions">
          <button id="sim-cancel">Cancel</button>
          <button id="sim-ok" class="primary">Process</button>
        </div>
      </div>
    </div>
    <ltspice-kicad-mapper id="m" theme="light"></ltspice-kicad-mapper>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
