<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kicad-schematic-viewer — poweramp demo</title>
    <style>
      :root {
        --bg: #0e1113; --panel: #171a1d; --line: #272c30; --fg: #e6e8ea;
        --muted: #8b949e; --accent: #ff8c00; --pow: #5db1ff;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        display: grid; grid-template-columns: 300px 1fr; height: 100vh;
        font: 14px/1.4 ui-sans-serif, system-ui, sans-serif; color: var(--fg); background: var(--bg);
      }
      aside { background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
      header { padding: 14px 16px; border-bottom: 1px solid var(--line); }
      header h1 { font-size: 15px; margin: 0 0 2px; }
      header p { margin: 0; color: var(--muted); font-size: 12px; }
      .search { padding: 10px 12px; border-bottom: 1px solid var(--line); }
      .search input { width: 100%; padding: 7px 9px; background: #0e1113; border: 1px solid var(--line); border-radius: 6px; color: var(--fg); }
      .tabs { display: flex; gap: 2px; padding: 8px 10px 0; }
      .tabs button { flex: 1; padding: 6px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font: inherit; }
      .tabs button.active { color: var(--fg); border-bottom-color: var(--accent); }
      .list { overflow: auto; flex: 1; padding: 6px; min-height: 0; }
      .row { display: flex; justify-content: space-between; gap: 8px; padding: 6px 9px; border-radius: 6px; cursor: pointer; }
      .row:hover { background: #21262b; }
      .row.sel { background: #2c2317; outline: 1px solid var(--accent); }
      .row .name { font-variant-numeric: tabular-nums; }
      .row .pow { color: var(--pow); }
      .row .meta { color: var(--muted); font-size: 12px; }
      main { position: relative; min-width: 0; }
      kicad-schematic { width: 100%; height: 100%; }
      .toolbar { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 5; }
      .toolbar button { padding: 6px 10px; background: var(--panel); color: var(--fg); border: 1px solid var(--line); border-radius: 6px; cursor: pointer; }
      .status { position: absolute; left: 12px; bottom: 12px; background: rgba(20,23,26,.85); padding: 6px 10px; border-radius: 6px; color: var(--muted); font-size: 12px; }
      .status b { color: var(--accent); }
    </style>
  </head>
  <body>
    <aside>
      <header>
        <h1>KiCad Schematic Viewer</h1>
        <p>poweramp.kicad_sch — click a net or component</p>
      </header>
      <div class="search"><input id="q" placeholder="Filter…" /></div>
      <div class="tabs">
        <button id="tab-nets" class="active">Nets</button>
        <button id="tab-comps">Components</button>
      </div>
      <div class="list" id="list"></div>
    </aside>
    <main>
      <div class="toolbar">
        <button id="fit">Fit</button>
        <button id="clear">Clear</button>
        <button id="theme">Theme</button>
      </div>
      <kicad-schematic id="sch" src="./poweramp.kicad_sch" theme="dark"></kicad-schematic>
      <div class="status" id="status">loading…</div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
